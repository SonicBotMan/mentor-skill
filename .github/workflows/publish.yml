name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # 触发条件：推送 vX.Y.Z 格式的 tag

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    # 勿在此使用 environment: xxx，除非你在 PyPI Trusted Publisher 里填写了同名 GitHub Environment；
    # 否则 OIDC sub 会带 :environment:xxx，与 PyPI 配置不一致 → invalid-publisher。
    permissions:
      id-token: write   # OIDC → PyPI Trusted Publisher（见 https://docs.pypi.org/trusted-publishers/ ）

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          pip install build hatchling

      - name: Run tests before publishing
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v --tb=short

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(python -c "from mentor_skill import __version__; print(__version__)")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package=$PKG_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "✅ Version matched: $PKG_VERSION"

      - name: Build package
        run: python -m build

      - name: Upload sdist and wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Secret 未设置时 password 为空 → 使用 OIDC，须在 PyPI 为本仓库添加 Trusted Publisher：
          # Owner: SonicBotMan，Repository: mentor-skill，Workflow: publish.yml（仅文件名，见 PyPI 文档）
          # https://docs.pypi.org/trusted-publishers/adding-a-publisher/
          # 若暂不配置 OIDC：在 GitHub 仓库 Settings → Secrets → Actions 添加 PYPI_API_TOKEN（pypi.org → Account → API tokens）
          password: ${{ secrets.PYPI_API_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # 从 CHANGELOG.md 提取当前版本的更新内容
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: mentor-skill ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.NOTES }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
